services:
  - type: web
    name: smartecg-assist
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: MODEL_PATH
        value: output/general_model/best_model.pth
